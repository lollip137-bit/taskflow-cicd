name: CI - Build and Push Docker Image

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-cicd:latest .

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-cicd:latest ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-cicd:${{ github.sha }}

      - name: Push Latest Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-cicd:latest

      - name: Push SHA Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-cicd:${{ github.sha }}
